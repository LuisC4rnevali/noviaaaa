<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Para Gaby! - Universo de Amor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@600;900&display=swap');
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #03010c; 
            font-family: 'Orbitron', sans-serif;
            color: #fff; 
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            background: #000; 
            overflow: hidden; 
            box-shadow: 0 0 60px rgba(255, 20, 147, 0.25);
            touch-action: none;
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            touch-action: none;
        }

        .pantalla-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at center, rgba(15, 5, 30, 0.98) 0%, rgba(2, 0, 5, 1) 100%); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 30; 
            padding: 30px; 
            text-align: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.4s ease;
        }

        .titulo-console {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 4px 0 #005555;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .terminal-box {
            background: rgba(255, 20, 147, 0.03);
            border: 2px solid rgba(255, 20, 147, 0.3);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(255, 20, 147, 0.1);
        }

        .input-console {
            width: 100%;
            background: #05040a;
            border: 2px solid #ff1493;
            border-radius: 10px;
            padding: 14px;
            font-size: 18px;
            color: #fff;
            text-align: center;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
        }

        .btn-arcade {
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            border: none;
            color: #fff;
            padding: 16px 50px;
            font-size: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 50px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.5), 0 5px 0 #b3005c;
            transition: all 0.1s ease;
        }

        .btn-arcade:active {
            transform: translateY(4px);
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3), 0 1px 0 #b3005c;
        }

        /* Carta de Amor con Scroll Táctil Garantizado */
        #carta-final {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            max-height: 85%;
            transform: translateY(-50%) scale(0.9);
            background: linear-gradient(145deg, #11051c 0%, #05010a 100%);
            border: 3px solid #ff1493;
            border-radius: 24px;
            padding: 25px;
            z-index: 40;
            display: none;
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.6);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            touch-action: pan-y !important;
        }

        #carta-final.show {
            transform: translateY(-50%) scale(1);
            opacity: 1;
        }

        .text-neon-pink {
            font-family: 'Montserrat', sans-serif;
            color: #ff1493;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
            font-weight: 900;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .log-content {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 15px;
            line-height: 1.6;
            color: #e2d9f3;
            background: rgba(255, 255, 255, 0.04);
            padding: 20px;
            border-radius: 14px;
            border-left: 4px solid #ff1493;
            height: 260px;
            overflow-y: auto !important; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            touch-action: pan-y !important; 
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Pantalla Inicial -->
    <div id="pantalla-inicio" class="pantalla-overlay">
        <div class="titulo-console">GALACTIC HEARTS<br><span style="color:#ff1493; font-size:16px; font-family:'Orbitron';">EDICIÓN ESPECIAL PARA GABY</span></div>
        
        <div class="terminal-box">
            <div id="record-display" style="color: #8fa0be; font-family:'Orbitron'; margin-bottom: 15px; font-size: 11px; letter-spacing: 1px;">SISTEMA LISTO // ESPERANDO PILOTO</div>
            <label style="color: #ffb6c1; display: block; margin-bottom: 12px; font-size: 12px; font-family:'Montserrat'; font-weight:900;">INGRESA TU NOMBRE:</label>
            <input type="text" id="nombre-input" value="Gaby" maxlength="10" class="input-console">
        </div>
        
        <button class="btn-arcade" onclick="comenzarJuego()">¡DESPEGAR!</button>
    </div>

    <!-- Carta Final Deslizable -->
    <div id="carta-final">
        <h2 class="text-neon-pink">💖 ¡MÁXIMA SINCRONIZACIÓN! 💖</h2>
        <div class="log-content" id="mensaje-carta-dinamico"></div>
        <button class="btn-arcade" style="width:100%; margin-top: 15px; background: #ff1493; box-shadow: 0 0 15px #ff1493;" onclick="reiniciarAlMenu()">VOLVER A JUGAR</button>
    </div>

    <canvas id="arcadeCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("arcadeCanvas");
const ctx = canvas.getContext("2d");
const container = document.getElementById("game-container");
const pantallaInicio = document.getElementById("pantalla-inicio");
const cartaFinal = document.getElementById("carta-final");
const recordDisplay = document.getElementById("record-display");
const nombreInput = document.getElementById("nombre-input");

const WIDTH = 460, HEIGHT = 720;
canvas.width = WIDTH; canvas.height = HEIGHT;

// Engine State
let gameState = "MENU", currentStage = 1, stateTimer = 0, score = 0, playerName = "Gaby";
let lastTime = performance.now(), lastShot = 0, lastSpawn = 0, starSpeedMultiplier = 1;
let shakeTime = 0, shakeIntensity = 0, flashFrames = 0, uiPulse = 0;
let bannerTitle = "", bannerDesc = "", bannerColor = "#00ffff";

// Sistema de Oleada por Conteo de Bajas
let enemigosCreadosEnFase = 0;
let enemigosEliminadosEnFase = 0;
let metaEnemigosPorFase = 15;

let player = { x: WIDTH / 2, targetX: WIDTH / 2, y: HEIGHT - 110, w: 34, h: 40, hp: 4, maxHp: 4, invincible: 0, tilt: 0, overcharge: false, overchargeTimer: 0 };
let lasers = [], enemyLasers = [], enemies = [], particles = [], stars = [], floatingTexts = [], shockwaves = [];

// POOL DE 55 NOMBRES EXCLUSIVOS: Relaciones, chisme, chats e indirectas divertidas (Sin cosas random)
const POOL_NOMBRES_ENEMIGOS = [
    "La Otra 😒", "Una amiguita 👀", "Compañera de trabajo 👩‍💻", "La Ex del pasado 🦖", "Mensajito raro 📱", 
    "La que da likes 💅", "Amiga del grupo 😵‍💫", "Un DM de la nada 📩", "La que te miró 😳", "La Bestie intensa 🤫", 
    "Un 'Hola perdido' 👋", "La de la fiesta 💃", "La que te dio follow 👤", "La que vio tu historia 👁️", 
    "Un DM sospechoso 📩", "La intensa del chat 💬", "La que reaccionó 🔥", "Un like a las 3 AM 🦉", 
    "La que te pide favores 🙋‍♀️", "La ex de hace años 🍂", "La que pregunta por ti ❓", "La del saludo cariñoso 🥰", 
    "La que te mandó fueguito 🔥", "La del número desconocido 📞", "La intensa de los estados 📱", 
    "La que te vio de lejos 👀", "La del sticker de corazón ❤️", "La que te mandó solicitud ➕", 
    "La que te tiene en mejores amigos ⭐", "La del '¿estás despierto?' 🛌", "La que te eliminó y volvió 🔄", 
    "La que te responde con indirectas 🏹", "La que se ríe de todos tus chistes 😂", "La que te guarda secretos 🤐", 
    "La que te dedica canciones 🎵", "La que te escribe de noche 🍹", "La que te llama 'amigo' 😏", 
    "La que busca conversación 🗣️", "La guardada como 'Mecánico' 🔧", "La guardada como 'Juan' 🧔", 
    "La que te pide fotos 📸", "Un audio de 5 minutos 🎙️", "La que te dejó en visto 👁️", 
    "La que te sigue en TikTok 🎵", "La del comentario coqueto 💬", "La que te tiene ganas 😬", 
    "La que te etiqueta en memes 🏷️", "La que te reenvía tiktoks 📲", "La del chat archivado 🗄️", 
    "La que te busca en Facebook 👥", "La ex que no supera 🧟‍♀️", "La amiguita del colegio 🎒", 
    "La que te escribe con caritas 😏", "La de los mensajes borrados ❌", "La que se pone celosa de mí 😤"
];

// Configuración de niveles
const NIVELES = {
    1: { 
        fase: "NIVEL 1: CERO DISTRACCIONES", 
        desc: "¡Derriba a las amiguitas y mensajes raros deslizando tu nave con el dedo!", 
        pregunta: "PRUEBA 1: ¿Quién es la niña más hermosa de todo el universo?", 
        opciones: [ {txt: "¡GABY! 🥰", ok: true}, {txt: "UN CLON EXTRAÑO 🤖", ok: false}, {txt: "ALGUIEN MÁS 👾", ok: false} ],
        palette: ["rgba(0, 242, 254, 0.15)", "rgba(79, 172, 254, 0.12)"],
        cantidadEnemigos: 15
    },
    2: { 
        fase: "NIVEL 2: PURA INTUICIÓN", 
        desc: "¡Cuidado con los misiles! Despeja el camino hacia mi corazón.", 
        pregunta: "PRUEBA 2: ¿Cuál es mi parte favorita de ti?", 
        opciones: [ {txt: "TUS OJITOS 🪐", ok: false}, {txt: "TU SONRISA ✨", ok: false}, {txt: "¡ABSOLUTAMENTE TODO! 😍", ok: true} ],
        palette: ["rgba(255, 20, 147, 0.16)", "rgba(148, 0, 211, 0.12)"],
        palette: ["rgba(255, 20, 147, 0.16)", "rgba(148, 0, 211, 0.12)"],
        cantidadEnemigos: 20
    },
    3: { 
        fase: "NIVEL 3: CONEXIÓN TOTAL", 
        desc: "Maximizando el amor cósmico para eliminar cualquier distancia.", 
        pregunta: "PRUEBA 3: ¿Cuánto te amo de aquí al espacio?", 
        opciones: [ {txt: "UN MONTÓN ENORME 📈", ok: false}, {txt: "MÁS ALLÁ DE TODOS LOS UNIVERSOS ✨", ok: true}, {txt: "MUCHÍSIMO 🪐", ok: false} ],
        palette: ["rgba(255, 140, 0, 0.15)", "rgba(255, 0, 0, 0.12)"],
        cantidadEnemigos: 25
    },
    4: { 
        fase: "NIVEL 4: DESTINO JUNTOS", 
        desc: "¡Fase final! Sincroniza el núcleo de nuestro futuro.", 
        pregunta: "PRUEBA FINAL: ¿Qué nos espera en el futuro juntos, mi vida?", 
        opciones: [ {txt: "VIAJAR Y COMER RICO 🥞", ok: false}, {txt: "MOMENTOS LINDOS ✨", ok: false}, {txt: "TODAS + VIEJITOS FELICES 👵👴❤️", ok: true} ],
        palette: ["rgba(0, 255, 128, 0.15)", "rgba(255, 20, 147, 0.12)"],
        cantidadEnemigos: 30
    }
};

function cargarRecordUI() {
    try {
        let max = localStorage.getItem('gabyCoreMax') || '0';
        let name = localStorage.getItem('gabyNameMax') || '';
        if (max !== '0') recordDisplay.innerHTML = `🏆 MEJOR PUNTUACIÓN: ${max} PTS de ${name.toUpperCase()}`;
    } catch(e){}
}
cargarRecordUI();

// Sonidos Arcade Estilo Consola
let audioCtx = null;
function playSound(type) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const now = audioCtx.currentTime;

        const makeTone = (freq, duration, typeWave = 'sine', vol = 0.06, glideTo = null) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = typeWave;
            osc.frequency.setValueAtTime(freq, now);
            if (glideTo !== null) osc.frequency.exponentialRampToValueAtTime(glideTo, now + duration);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1800, now);
            filter.Q.value = 0.7;

            gain.gain.setValueAtTime(vol, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + duration);
        };

        if (type === 'laser') {
            makeTone(880, 0.08, 'triangle', 0.05, 1320);
        } else if (type === 'hit') {
            makeTone(220, 0.12, 'sine', 0.06, 140);
            setTimeout(() => makeTone(140, 0.08, 'triangle', 0.03, 90), 35);
        } else if (type === 'shield') {
            makeTone(520, 0.18, 'sine', 0.05, 260);
            setTimeout(() => makeTone(780, 0.10, 'triangle', 0.025, 980), 60);
        } else if (type === 'explosion') {
            makeTone(120, 0.30, 'sawtooth', 0.08, 45);
            setTimeout(() => makeTone(70, 0.22, 'sine', 0.04, 30), 80);
        } else if (type === 'win') {
            makeTone(523.25, 0.12, 'triangle', 0.05);
            setTimeout(() => makeTone(659.25, 0.12, 'triangle', 0.05), 120);
            setTimeout(() => makeTone(783.99, 0.16, 'triangle', 0.05), 240);
        }
    } catch(e){}
}

for (let i = 0; i < 60; i++) {
    stars.push({ x: Math.random() * WIDTH, y: Math.random() * HEIGHT, w: Math.random() * 1.6 + 0.4, speed: Math.random() * 2.2 + 0.4, alpha: Math.random() * 0.5 + 0.2 });
}

function lanzarBanner(t, d, color, sTime, nextState) {
    bannerTitle = t; bannerDesc = d; bannerColor = color; stateTimer = sTime; gameState = nextState;
}

function comenzarJuego() {
    playerName = nombreInput.value.trim() || "Gaby";
    pantallaInicio.style.opacity = "0";
    setTimeout(() => pantallaInicio.style.display = "none", 400);
    
    score = 0; currentStage = 1; lasers = []; enemyLasers = []; enemies = []; floatingTexts = []; shockwaves = [];
    player.hp = player.maxHp; player.x = WIDTH / 2; player.targetX = WIDTH / 2; player.overcharge = false;
    starSpeedMultiplier = 1;
    
    enemigosCreadosEnFase = 0;
    enemigosEliminadosEnFase = 0;
    metaEnemigosPorFase = NIVELES[currentStage].cantidadEnemigos;

    lanzarBanner(`¡BIENVENIDA ${playerName.toUpperCase()}!`, "Prepárate para limpiar el espacio de cualquier otra. ¡Desliza para moverte!", "#00ffff", 2800, "INTRO");
}

function inicializarJefes() {
    enemies = [];
    let config = NIVELES[currentStage];
    if(!config) return;

    config.opciones.forEach((opc, idx) => {
        enemies.push({
            x: 75 + (idx * 155),
            y: 220,
            baseY: 220 + (idx * 85),
            txt: opc.txt,
            isCorrect: opc.ok,
            w: 42, h: 42,
            vx: (idx % 2 === 0 ? 1 : -1) * 1.1,
            timeOffset: idx * 350,
            isBossNode: true,
            shieldPulse: 0,
            flashFrames: 0,
            hp: opc.ok ? 25 : 999, 
            maxHp: opc.ok ? 25 : 999
        });
    });
}

function activarVictoria() {
    gameState = "VICTORY";
    try {
        let max = parseInt(localStorage.getItem('gabyCoreMax') || '0');
        if (score > max) {
            localStorage.setItem('gabyCoreMax', score);
            localStorage.setItem('gabyNameMax', playerName);
        }
    } catch(e){}

    let logHTML = `¡Hola mi amor, mi princesa hermosa! 💕<br><br>` +
                  `Felicidades por completar este viaje galáctico. Has destruido cada mensaje inoportuno, amiguita intensa y distracción con una precisión increíble. Tu corazón vuela a la misma velocidad que el mío.<br><br>` +
                  `Quiero que recuerdes siempre que eres el centro de mi universo, mi copiloto favorita para toda la vida y la única dueña de todo el amor que tengo para dar.<br><br>` +
                  `Gracias por existir y por hacer mi mundo mucho más brillante cada día. No me importa el mapa ni las distancias, contigo quiero ir siempre hacia adelante.<br><br>` +
                  `Viejitos, felices, viajando mucho, comiendo delicias y ridículamente enamorados por el resto de la eternidad. 👵👴❤️<br><br>` +
                  `>>> TU RECORD LOGRADO: ${score} PUNTOS DE AMOR TOTAL.`;
                  
    document.getElementById("mensaje-carta-dinamico").innerHTML = logHTML;
    cartaFinal.style.display = "block";
    setTimeout(() => cartaFinal.classList.add("show"), 50);
}

function reiniciarAlMenu() {
    cartaFinal.classList.remove("show");
    setTimeout(() => {
        cartaFinal.style.display = "none";
        pantallaInicio.style.display = "flex";
        setTimeout(() => pantallaInicio.style.opacity = "1", 50);
        cargarRecordUI();
        gameState = "MENU";
    }, 400);
}

// --- CONTROLES INTUITIVOS ---
function procesarMovimiento(e) {
    if (["MENU", "VICTORY", "INTRO", "BOSS_BANNER", "GAMEOVER"].includes(gameState)) return;
    const rect = canvas.getBoundingClientRect();
    
    let clientX = e.clientX;
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
    }
    
    let inputX = clientX - rect.left;
    player.targetX = inputX * (WIDTH / rect.width);
    
    if (player.targetX < 24) player.targetX = 24;
    if (player.targetX > WIDTH - 24) player.targetX = WIDTH - 24;
}

container.addEventListener('pointerdown', (e) => {
    if (gameState === "VICTORY") return; 
    container.setPointerCapture(e.pointerId);
    procesarMovimiento(e);
});
container.addEventListener('pointermove', procesarMovimiento);
container.addEventListener('pointerup', (e) => {
    if (gameState === "VICTORY") return;
    container.releasePointerCapture(e.pointerId);
});
container.addEventListener('touchmove', (e) => {
    if (["MENU", "VICTORY", "INTRO", "BOSS_BANNER", "GAMEOVER"].includes(gameState)) return;
    procesarMovimiento(e);
    e.preventDefault();
}, { passive: false });

// --- UPDATE ENGINE ---
function updateFisicas(dt, ahora) {
    uiPulse += dt * 0.005;
    if (shakeTime > 0) shakeTime -= dt;
    if (player.invincible > 0) player.invincible -= dt;

    if (player.overcharge) {
        player.overchargeTimer -= dt;
        if(player.overchargeTimer <= 0) player.overcharge = false;
    }

    stars.forEach(s => {
        s.y += s.speed * starSpeedMultiplier * (dt / 16.6);
        if (s.y > HEIGHT) { s.y = 0; s.x = Math.random() * WIDTH; }
    });

    for (let i = shockwaves.length - 1; i >= 0; i--) {
        let sw = shockwaves[i];
        sw.r += sw.speed * (dt / 16.6);
        sw.alpha -= 0.03 * (dt / 16.6);
        if (sw.alpha <= 0) shockwaves.splice(i, 1);
    }

    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        floatingTexts[i].y -= 1.4 * (dt / 16.6);
        floatingTexts[i].life -= dt;
        if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
    }

    if (["MENU", "VICTORY"].includes(gameState)) return;

    if (["INTRO", "BOSS_BANNER", "GAMEOVER"].includes(gameState)) {
        stateTimer -= dt;
        if (stateTimer <= 0) {
            if (gameState === "INTRO") {
                gameState = "PLAYING";
                lastSpawn = ahora;
            } else if (gameState === "BOSS_BANNER") {
                gameState = "BOSS";
                inicializarJefes();
            } else if (gameState === "GAMEOVER") {
                player.hp = player.maxHp;
                enemigosCreadosEnFase = 0;
                enemigosEliminadosEnFase = 0;
                metaEnemigosPorFase = NIVELES[currentStage].cantidadEnemigos;
                lanzarBanner(NIVELES[currentStage].fase, NIVELES[currentStage].desc, "#00ffff", 2500, "INTRO");
            }
        }
        return;
    }

    let anteriorX = player.x;
    player.x += (player.targetX - player.x) * 0.28; 
    let deltaX = player.x - anteriorX;
    player.tilt += (deltaX * 0.18 - player.tilt) * 0.25; 

    if (Math.random() < 0.6) {
        particles.push({
            x: player.x + (Math.random() - 0.5) * 8,
            y: player.y + 18,
            vx: (Math.random() - 0.5) * 2,
            vy: Math.random() * 3 + 2,
            size: Math.random() * 3 + 1,
            alpha: 0.8,
            decay: 0.04,
            c: Math.random() > 0.4 ? "#00ffff" : "#ff1493"
        });
    }

    let cadencia = player.overcharge ? 80 : 150;
    if (ahora - lastShot > cadencia) {
        if (player.overcharge) {
            lasers.push({ x: player.x - 12, y: player.y - 15, vy: -12, c: "#ff1493", w: 3, h: 22, dmg: 1 });
            lasers.push({ x: player.x + 12, y: player.y - 15, vy: -12, c: "#ff1493", w: 3, h: 22, dmg: 1 });
            lasers.push({ x: player.x, y: player.y - 25, vy: -13, c: "#ffdf00", w: 4, h: 26, dmg: 2 });
        } else {
            lasers.push({ x: player.x, y: player.y - 22, vy: -10, c: "#00ffff", w: 4, h: 18, dmg: 1 });
        }
        playSound('laser');
        lastShot = ahora;
    }

    for (let i = lasers.length - 1; i >= 0; i--) {
        let l = lasers[i];
        l.y += l.vy * (dt / 16.6);
        if (l.y < -30) lasers.splice(i, 1);
    }

    if (gameState === "PLAYING") {
        if (enemigosCreadosEnFase < metaEnemigosPorFase && ahora - lastSpawn > 520) {
            let t = POOL_NOMBRES_ENEMIGOS[Math.floor(Math.random() * POOL_NOMBRES_ENEMIGOS.length)];
            enemies.push({
                x: Math.random() * (WIDTH - 100) + 50,
                y: -40,
                txt: t,
                w: 26, h: 26,
                vx: (Math.random() - 0.5) * 3.5,
                vy: Math.random() * 1.5 + 2.8,
                isBossNode: false,
                flashFrames: 0,
                hp: 2
            });
            enemigosCreadosEnFase++;

            if (Math.random() < 0.12) {
                enemies.push({ x: Math.random() * (WIDTH - 80) + 40, y: -40, txt: "REGALITO ⚡", w: 28, h: 28, vx: 0, vy: 2.2, isPowerUp: true, hp: 1, flashFrames: 0 });
            }
            lastSpawn = ahora;
        }

        if (enemigosEliminadosEnFase >= metaEnemigosPorFase && enemies.length === 0) {
            lanzarBanner("🚨 ¡ALERTA DE JEFE! 🚨", `Invasoras eliminadas. Responde correctamente la PRUEBA ${currentStage} para avanzar.`, "#ff1493", 3500, "BOSS_BANNER");
            return;
        }
    }

    for (let i = enemyLasers.length - 1; i >= 0; i--) {
        let el = enemyLasers[i];
        el.y += 5.5 * (dt / 16.6);
        if (el.y > HEIGHT + 20) { enemyLasers.splice(i, 1); continue; }
        
        if (Math.hypot(el.x - player.x, el.y - player.y) < 22 && player.invincible <= 0) {
            enemyLasers.splice(i, 1);
            recibirDanoNave();
        }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];

        if (!e.isBossNode) {
            e.y += e.vy * (dt / 16.6);
            e.x += e.vx * (dt / 16.6);
            if (e.x < 30 || e.x > WIDTH - 30) e.vx *= -1;
            if (e.flashFrames > 0) e.flashFrames--;

            if (!e.isPowerUp && Math.random() < 0.015) {
                enemyLasers.push({ x: e.x, y: e.y + 15 });
            }

            if (Math.hypot(e.x - player.x, e.y - player.y) < 26) {
                enemies.splice(i, 1);
                if (e.isPowerUp) {
                    player.overcharge = true;
                    player.overchargeTimer = 6000; 
                    floatingTexts.push({ x: player.x, y: player.y - 40, txt: "¡SUPER MEJA-RÁFAGA!", c: "#ffdf00", life: 1600 });
                    score += 200;
                    playSound('win');
                    shockwaves.push({ x: player.x, y: player.y, r: 10, maxR: 120, speed: 6, alpha: 1, c: "#ffdf00" });
                } else {
                    if (!e.isPowerUp) enemigosEliminadosEnFase++; 
                    recibirDanoNave();
                }
                continue;
            }
            if (e.y > HEIGHT + 40) { 
                enemies.splice(i, 1); 
                if (!e.isPowerUp) enemigosEliminadosEnFase++; 
                continue; 
            }
        } else {
            e.x += e.vx * (dt / 16.6);
            e.y = e.baseY + Math.sin((ahora + e.timeOffset) / 180) * 14;
            if (e.x < 55 || e.x > WIDTH - 55) e.vx *= -1;
            if (e.shieldPulse > 0) e.shieldPulse -= dt;
            if (e.flashFrames > 0) e.flashFrames--;
        }

        for (let j = lasers.length - 1; j >= 0; j--) {
            let l = lasers[j];
            let rangoColision = e.isBossNode ? 42 : 22;

            if (Math.hypot(l.x - e.x, l.y - e.y) < rangoColision) {
                lasers.splice(j, 1);
                e.hp -= l.dmg;
                e.flashFrames = 4; 

                if (e.isBossNode) {
                    if (e.isCorrect) {
                        score += 50;
                        floatingTexts.push({ x: e.x + (Math.random()-0.5)*30, y: e.y - 20, txt: `-${l.dmg}`, c: "#ff1493", life: 600 });
                        crearDestelloParticulas(l.x, l.y, "#ff1493", 6);
                        shakeTime = 150; shakeIntensity = 6;
                        playSound('hit');

                        if (e.hp <= 0) {
                            enemies = []; 
                            playSound('explosion');
                            detonarExplosionGigante(e.x, e.y, "#ff1493");
                            score += 2000;
                            flashFrames = 15;
                            shakeTime = 600; shakeIntensity = 20;

                            currentStage++;
                            setTimeout(() => {
                                if (NIVELES[currentStage]) {
                                    enemigosCreadosEnFase = 0;
                                    enemigosEliminadosEnFase = 0;
                                    metaEnemigosPorFase = NIVELES[currentStage].cantidadEnemigos;
                                    lanzarBanner(`¡FASE COMPILADA!`, `Accediendo al siguiente sector galáctico...`, "#00ffff", 3000, "INTRO");
                                } else {
                                    activarVictoria();
                                }
                            }, 1400);
                            
                            return; 
                        }
                    } else {
                        e.hp = e.maxHp; 
                        e.shieldPulse = 250;
                        playSound('shield');
                        score = Math.max(0, score - 100);
                        floatingTexts.push({ x: l.x, y: l.y - 15, txt: "¡ESCUDO REBOTADOR!", c: "#00ffff", life: 800 });
                        crearDestelloParticulas(l.x, l.y, "#00ffff", 8);
                        shockwaves.push({ x: e.x, y: e.y, r: 20, maxR: 65, speed: 4, alpha: 0.8, c: "#00ffff" });
                    }
                } else {
                    if (e.hp <= 0) {
                        enemies.splice(i, 1);
                        if (!e.isPowerUp) enemigosEliminadosEnFase++; 
                        playSound('explosion');
                        detonarExplosionGigante(e.x, e.y, e.isPowerUp ? "#ffdf00" : "#00ffff");
                        score += 100;
                        floatingTexts.push({ x: e.x, y: e.y, txt: e.isPowerUp ? "ARMAS ARRIBA" : "+100", c: e.isPowerUp ? "#ffdf00" : "#00ffff", life: 900 });
                    } else {
                        playSound('hit');
                        crearDestelloParticulas(l.x, l.y, "#00ffff", 4);
                    }
                }
                break;
            }
        }
    }
}

function recibirDanoNave() {
    if (player.invincible > 0) return;
    player.hp--;
    player.invincible = 1600;
    player.overcharge = false; 
    shakeTime = 450; shakeIntensity = 15;
    playSound('hit');
    shockwaves.push({ x: player.x, y: player.y, r: 5, maxR: 100, speed: 5, alpha: 1, c: "#ff3333" });
    
    if (player.hp <= 0) {
        gameState = "GAMEOVER";
        stateTimer = 3500;
        enemies = [];
    }
}

function crearDestelloParticulas(x, y, color, qty) {
    for (let i = 0; i < qty; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            size: Math.random() * 2.5 + 1.5,
            alpha: 1, decay: 0.05, c: color
        });
    }
}

function detonarExplosionGigante(x, y, color) {
    shockwaves.push({ x: x, y: y, r: 5, maxR: 90, speed: 5, alpha: 1, c: color });
    for (let i = 0; i < 35; i++) {
        let ang = Math.random() * Math.PI * 2;
        let v = Math.random() * 7 + 3;
        particles.push({
            x: x, y: y,
            vx: Math.cos(ang) * v,
            vy: Math.sin(ang) * v,
            size: Math.random() * 4 + 2,
            alpha: 1,
            decay: Math.random() * 0.02 + 0.015,
            c: color
        });
    }
}

// --- RENDERIZACIÓN ---
function drawGame() {
    ctx.fillStyle = "#020106";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    let cfgNivel = NIVELES[currentStage] || NIVELES[4];
    let nebPulse = Math.sin(uiPulse * 1.5) * 0.03; 
    
    let nebulaGlow = ctx.createRadialGradient(WIDTH/2, HEIGHT/2 - 50, 20, WIDTH/2, HEIGHT/2, 380);
    nebulaGlow.addColorStop(0, cfgNivel.palette[0].replace("0.15", (0.16 + nebPulse).toString()));
    nebulaGlow.addColorStop(0.6, cfgNivel.palette[1]);
    nebulaGlow.addColorStop(1, "rgba(0,0,0,0)");
    
    ctx.fillStyle = nebulaGlow;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    ctx.save();
    if (shakeTime > 0) {
        ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
    }

    stars.forEach(s => {
        ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
        ctx.fillRect(s.x, s.y, s.w, s.w);
    });

    shockwaves.forEach(sw => {
        ctx.save();
        ctx.globalAlpha = sw.alpha;
        ctx.strokeStyle = sw.c; ctx.lineWidth = 3;
        ctx.shadowBlur = 15; ctx.shadowColor = sw.c;
        ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    });

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.shadowBlur = 12; ctx.shadowColor = p.c;
        ctx.fillStyle = p.c;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
        if (p.alpha <= 0) particles.splice(i, 1);
    }

    // Nave Vectorial
    if (!(player.invincible > 0 && Math.floor(player.invincible / 80) % 2 === 1)) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.tilt); 

        let pulsaciónGlow = 16 + Math.sin(uiPulse * 6) * 4;
        ctx.shadowBlur = pulsaciónGlow; ctx.shadowColor = "#ff1493";
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.moveTo(-5, 18); ctx.lineTo(0, 18 + pulsaciónGlow); ctx.lineTo(5, 18);
        ctx.closePath(); ctx.fill();

        ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
        ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 2.5;
        ctx.fillStyle = "#090717";
        ctx.beginPath();
        ctx.moveTo(0, -24);       
        ctx.lineTo(18, 12);       
        ctx.lineTo(6, 6);         
        ctx.lineTo(-6, 6);        
        ctx.lineTo(-18, 12);      
        ctx.closePath();
        ctx.fill(); ctx.stroke();

        ctx.fillStyle = player.overcharge ? "#ff1493" : "#ffffff";
        ctx.beginPath(); ctx.arc(0, -4, 4, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    lasers.forEach(l => {
        ctx.save();
        ctx.shadowBlur = 16; ctx.shadowColor = l.c;
        ctx.fillStyle = l.c;
        ctx.fillRect(l.x - l.w/2, l.y, l.w, l.h);
        ctx.fillStyle = "#ffffff"; 
        ctx.fillRect(l.x - 1, l.y + 2, 2, l.h - 4);
        ctx.restore();
    });

    enemyLasers.forEach(el => {
        ctx.save();
        ctx.shadowBlur = 12; ctx.shadowColor = "#ff3333";
        ctx.fillStyle = "#ff3333";
        ctx.beginPath(); ctx.arc(el.x, el.y, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(el.x, el.y, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });

    enemies.forEach(e => {
        ctx.save();
        if (e.isBossNode) {
            let escudoActivo = e.shieldPulse > 0;
            ctx.shadowBlur = e.flashFrames > 0 ? 30 : (escudoActivo ? 28 : 15);
            ctx.shadowColor = e.flashFrames > 0 ? "#fff" : (escudoActivo ? "#00ffff" : (e.isCorrect ? "#ff1493" : "#3b2575"));
            
            ctx.fillStyle = e.flashFrames > 0 ? "#ffffff" : "rgba(5, 3, 14, 0.95)";
            ctx.strokeStyle = escudoActivo ? "#00ffff" : (e.isCorrect ? "#ff1493" : "#442d8c");
            ctx.lineWidth = escudoActivo ? 4 : 2;
            ctx.beginPath(); ctx.roundRect(e.x - 65, e.y - 25, 130, 50, 12); ctx.fill(); ctx.stroke();

            if (escudoActivo) {
                ctx.strokeStyle = "rgba(0, 255, 255, 0.25)";
                ctx.lineWidth = 1.5;
                for(let g = -55; g < 65; g += 15) {
                    ctx.beginPath(); ctx.moveTo(e.x + g, e.y - 18); ctx.lineTo(e.x + g, e.y + 18); ctx.stroke();
                }
            }

            ctx.fillStyle = e.flashFrames > 0 ? "#000" : "#ffffff";
            ctx.font = "bold 11px 'Orbitron', sans-serif";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            
            let bloques = e.txt.split(" ");
            if(bloques.length > 2) {
                ctx.fillText(bloques.slice(0,2).join(" "), e.x, e.y - 7);
                ctx.fillText(bloques.slice(2).join(" "), e.x, e.y + 8);
            } else {
                ctx.fillText(e.txt, e.x, e.y);
            }

            if (e.isCorrect && e.hp < e.maxHp) {
                let barraAncho = 100;
                let pctVida = e.hp / e.maxHp;
                ctx.fillStyle = "rgba(255,255,255,0.1)";
                ctx.fillRect(e.x - barraAncho/2, e.y + 32, barraAncho, 6);
                ctx.fillStyle = "#ff1493";
                ctx.fillRect(e.x - barraAncho/2, e.y + 32, barraAncho * pctVida, 6);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 0.5;
                ctx.strokeRect(e.x - barraAncho/2, e.y + 32, barraAncho, 6);
            }
        } else {
            ctx.shadowBlur = e.flashFrames > 0 ? 30 : 12;
            ctx.shadowColor = e.flashFrames > 0 ? "#fff" : (e.isPowerUp ? "#ffdf00" : "#00ffff");
            ctx.strokeStyle = e.isPowerUp ? "#ffdf00" : "#00ffff";
            ctx.fillStyle = e.flashFrames > 0 ? "#fff" : "#070514";
            ctx.lineWidth = 2;

            ctx.beginPath();
            if (e.isPowerUp) {
                ctx.moveTo(e.x, e.y - 14); ctx.lineTo(e.x + 14, e.y); ctx.lineTo(e.x, e.y + 14); ctx.lineTo(e.x - 14, e.y);
            } else {
                ctx.moveTo(e.x, e.y - 12); 
                ctx.lineTo(e.x + 14, e.y + 12); 
                ctx.lineTo(e.x, e.y + 4); 
                ctx.lineTo(e.x - 14, e.y + 12);
            }
            ctx.closePath(); ctx.fill(); ctx.stroke();

            if (e.flashFrames === 0) {
                ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
                ctx.font = "bold 11px 'Montserrat', sans-serif";
                ctx.textAlign = "center";
                ctx.strokeText(e.txt, e.x, e.y - 18);
                ctx.fillText(e.txt, e.x, e.y - 18);
            }
        }
        ctx.restore();
    });

    ctx.restore(); 

    floatingTexts.forEach(ft => {
        ctx.save();
        ctx.globalAlpha = Math.min(1, ft.life / 300);
        ctx.fillStyle = ft.c; ctx.strokeStyle = "#000000"; ctx.lineWidth = 4;
        ctx.font = "900 14px 'Montserrat', sans-serif";
        ctx.textAlign = "center";
        ctx.strokeText(ft.txt, ft.x, ft.y); ctx.fillText(ft.txt, ft.x, ft.y);
        ctx.restore();
    });

    // --- INTERFAZ SIMPLIFICADA ---
    if (gameState !== "MENU" && gameState !== "VICTORY") {
        ctx.save();
        ctx.fillStyle = "rgba(4, 2, 15, 0.9)";
        ctx.strokeStyle = "rgba(255, 20, 147, 0.3)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(15, 15, WIDTH - 30, 52, 10); ctx.fill(); ctx.stroke();

        ctx.fillStyle = "#ffb6c1"; ctx.font = "bold 9px 'Montserrat'";
        ctx.fillText("PILOTO", 28, 31);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 14px 'Montserrat'";
        ctx.fillText(playerName.toUpperCase(), 28, 49);

        ctx.fillStyle = "#ffb6c1"; ctx.font = "bold 9px 'Montserrat'"; ctx.textAlign = "right";
        ctx.fillText("PUNTOS", WIDTH - 28, 31);
        ctx.fillStyle = "#ffdf00"; ctx.font = "bold 16px 'Orbitron'";
        ctx.fillText(score.toString(), WIDTH - 28, 50);

        ctx.textAlign = "center";
        ctx.fillStyle = "#1e0b26";
        ctx.fillRect(WIDTH/2 - 45, 41, 90, 8);
        let pctVida = player.hp / player.maxHp;
        ctx.fillStyle = pctVida > 0.4 ? "#00ffcc" : "#ff2a51";
        ctx.fillRect(WIDTH/2 - 45, 41, 90 * pctVida, 8);
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 0.5; ctx.strokeRect(WIDTH/2 - 45, 41, 90, 8);

        ctx.fillStyle = "#ffffff"; ctx.font = "900 9px 'Montserrat'";
        ctx.fillText(`ESCUDO`, WIDTH/2, 33);

        if (gameState === "PLAYING") {
            let pctProgreso = enemigosEliminadosEnFase / metaEnemigosPorFase;
            ctx.fillStyle = "rgba(0, 255, 255, 0.08)";
            ctx.fillRect(15, 73, WIDTH - 30, 4);
            ctx.fillStyle = "#00ffff";
            ctx.fillRect(15, 73, (WIDTH - 30) * Math.min(1, pctProgreso), 4);
        }

        if (gameState === "BOSS") {
            ctx.fillStyle = "rgba(3, 1, 8, 0.96)";
            ctx.strokeStyle = "#ff1493"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.roundRect(15, 80, WIDTH - 30, 52, 10); ctx.fill(); ctx.stroke();
            
            ctx.fillStyle = "#ffff00"; ctx.font = "bold 12px 'Montserrat', sans-serif";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(NIVELES[currentStage].pregunta, WIDTH/2, 106);
        }
        ctx.restore();
    }

    if (["INTRO", "BOSS_BANNER", "GAMEOVER"].includes(gameState)) {
        ctx.save();
        ctx.fillStyle = "rgba(5, 2, 15, 0.96)";
        ctx.strokeStyle = bannerColor; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(25, HEIGHT/2 - 110, WIDTH - 50, 180, 20); ctx.fill(); ctx.stroke();
        
        ctx.fillStyle = bannerColor; ctx.font = "900 20px 'Montserrat'"; ctx.textAlign = "center";
        ctx.fillText(bannerTitle, WIDTH / 2, HEIGHT/2 - 50);
        
        ctx.fillStyle = "#eae6f3"; ctx.font = "bold 14px 'Montserrat', sans-serif";
        let parrafos = bannerDesc.split(" "), lineaActual = "", yPos = HEIGHT/2 - 10;
        for (let n = 0; n < parrafos.length; n++) {
            let textPrueba = lineaActual + parrafos[n] + " ";
            if (ctx.measureText(textPrueba).width > WIDTH - 90 && n > 0) {
                ctx.fillText(lineaActual, WIDTH / 2, yPos); lineaActual = parrafos[n] + " "; yPos += 22;
            } else { lineaActual = textPrueba; }
        }
        ctx.fillText(lineaActual, WIDTH / 2, yPos);
        ctx.restore();
    }

    if (flashFrames > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${flashFrames / 15})`;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        flashFrames--;
    }
}

function gameLoop(now) {
    let dt = now - lastTime;
    if (dt > 100) dt = 16.6;
    lastTime = now;

    updateFisicas(dt, now);
    drawGame();

    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
